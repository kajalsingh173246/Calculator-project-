<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.calculator{
    width:320px;
    background:#222;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

#display{
    width:100%;
    height:60px;
    font-size:28px;
    text-align:right;
    padding:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#fff;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#f1f1f1;
}

.operator{
    background:#ff9800;
    color:#fff;
}

.equal{
    background:#4CAF50;
    color:#fff;
}

.clear{
    background:#f44336;
    color:#fff;
}
</style>
</head>

<body>

<div class="calculator">
<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="deleteLast()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()" style="grid-column:span 2;">=</button>

</div>
</div>

<script>
let display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
